name: Build Debug APK

on:
  push:
    branches:
      - main   # যেকোনো commit-এ trigger হবে

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ১. কোড ডাউনলোড করো
      - name: Checkout code
        uses: actions/checkout@v4

      # ২. Java 17 সেটআপ করো
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ৩. .env ফাইল বানাও (Gemini API Key দিয়ে)
      - name: Create .env file
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      # ৪. Gradle কে execute permission দাও
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ৫. APK বিল্ড করো
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ৬. APK আপলোড করো (ডাউনলোডযোগ্য)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dhumpanmukto-poth-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30