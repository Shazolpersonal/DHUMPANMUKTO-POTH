name: Build Debug APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node deprecation fix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create .env file
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      # gradlew নেই, তাই system gradle দিয়ে তৈরি করব
      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=9.3.1 --distribution-type=bin
          chmod +x gradlew
          ls -la gradlew   # confirm হলো কিনা দেখতে

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dhumpanmukto-poth-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30