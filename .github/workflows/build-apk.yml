name: Build Debug APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Create .env file
        run: echo "GEMINI_API_KEY=dummy_not_used" > .env

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=9.3.1 --distribution-type=bin
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Djava.awt.headless=true -Dorg.gradle.jvmargs=-Xmx4g -Djava.awt.headless=true -Dkotlin.incremental=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dhumpanmukto-poth-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30